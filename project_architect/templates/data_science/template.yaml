template:
  name: "Data Science Project"
  type: "data_science"
  description: "Data science and machine learning project with Jupyter notebooks"
  version: "1.0.0"
  author: "Project Architect"
  frameworks:
    - "scikit-learn"
    - "pytorch"
    - "tensorflow"

structure:
  # Directories
  - path: "notebooks"
    type: "directory"
  - path: "src"
    type: "directory"
  - path: "data"
    type: "directory"
  - path: "data/raw"
    type: "directory"
  - path: "data/processed"
    type: "directory"
  - path: "models"
    type: "directory"
  - path: "tests"
    type: "directory"
  - path: "dev_sessions"
    type: "directory"

  # Notebooks
  - path: "notebooks/01_exploration.ipynb"
    type: "file"
    template: "notebooks/01_exploration.ipynb.j2"
  - path: "notebooks/02_preprocessing.ipynb"
    type: "file"
    template: "notebooks/02_preprocessing.ipynb.j2"
  - path: "notebooks/03_modeling.ipynb"
    type: "file"
    template: "notebooks/03_modeling.ipynb.j2"

  # Source code
  - path: "src/__init__.py"
    type: "file"
    content: ""
  - path: "src/data_loader.py"
    type: "file"
    template: "src/data_loader.py.j2"
  - path: "src/preprocessing.py"
    type: "file"
    template: "src/preprocessing.py.j2"
  - path: "src/features.py"
    type: "file"
    template: "src/features.py.j2"
  - path: "src/model.py"
    type: "file"
    template: "src/model.py.j2"
  - path: "src/evaluate.py"
    type: "file"
    template: "src/evaluate.py.j2"

  # Data placeholders
  - path: "data/raw/.gitkeep"
    type: "file"
    content: ""
  - path: "data/processed/.gitkeep"
    type: "file"
    content: ""
  - path: "models/.gitkeep"
    type: "file"
    content: ""

  # Tests
  - path: "tests/__init__.py"
    type: "file"
    content: ""
  - path: "tests/conftest.py"
    type: "file"
    template: "tests/conftest.py.j2"
  - path: "tests/test_preprocessing.py"
    type: "file"
    template: "tests/test_preprocessing.py.j2"
    condition: "include_tests"

  # Dev sessions
  - path: "dev_sessions/README.md"
    type: "file"
    template: "dev_sessions/README.md.j2"

  # Configuration
  - path: "requirements.txt"
    type: "file"
    template: "requirements.txt.j2"
  - path: "pyproject.toml"
    type: "file"
    template: "pyproject.toml.j2"
  - path: ".gitignore"
    type: "file"
    template: ".gitignore.j2"
  - path: "pytest.ini"
    type: "file"
    template: "pytest.ini.j2"
    condition: "include_tests"

  # Documentation
  - path: "README.md"
    type: "file"
    template: "README.md.j2"
  - path: "AI_CONTEXT.md"
    type: "file"
    template: "AI_CONTEXT.md.j2"
  - path: "TECHNICAL_SPECIFICATION.md"
    type: "file"
    template: "TECHNICAL_SPECIFICATION.md.j2"
  - path: "DEV_RULES.md"
    type: "file"
    template: "DEV_RULES.md.j2"
  - path: "DEV_PROCESS.md"
    type: "file"
    template: "DEV_PROCESS.md.j2"
  - path: "CODING_STANDARDS.md"
    type: "file"
    template: "CODING_STANDARDS.md.j2"
  - path: "IMPLEMENTATION_PLAN.md"
    type: "file"
    template: "IMPLEMENTATION_PLAN.md.j2"

requirements:
  core:
    - "numpy>=1.24.0"
    - "pandas>=2.0.0"
    - "matplotlib>=3.7.0"
    - "seaborn>=0.12.0"
    - "jupyter>=1.0.0"
  sklearn:
    - "scikit-learn>=1.3.0"
  pytorch:
    - "torch>=2.0.0"
  tensorflow:
    - "tensorflow>=2.14.0"
  testing:
    - "pytest>=7.4.0"

