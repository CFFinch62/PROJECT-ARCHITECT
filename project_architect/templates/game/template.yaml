# Game Template Configuration
# Project Architect Template System

template:
  name: "Game"
  type: "game"
  description: "Python game with a choice of Pygame, Arcade, Pyglet, or Pygame Zero"
  version: "1.0.0"
  author: "Project Architect"

  # Supported game frameworks
  frameworks:
    - pygame
    - arcade
    - pyglet
    - pgzero

# Project structure definition
structure:
  # Root directories
  - path: "src"
    type: "directory"
  - path: "tests"
    type: "directory"
  - path: "docs"
    type: "directory"
  - path: "dev_sessions"
    type: "directory"
  - path: "assets"
    type: "directory"
  - path: "assets/images"
    type: "directory"
  - path: "assets/sounds"
    type: "directory"

  # Main application files
  - path: "main.py"
    type: "file"
    template: "main.py.j2"
  - path: "requirements.txt"
    type: "file"
    template: "requirements.txt.j2"
  - path: "setup.py"
    type: "file"
    template: "setup.py.j2"

  # Source code structure
  - path: "src/__init__.py"
    type: "file"
    template: "src/__init__.py.j2"
  - path: "src/game.py"
    type: "file"
    template: "src/game.py.j2"
  - path: "src/config.py"
    type: "file"
    template: "src/config.py.j2"
  - path: "src/utils.py"
    type: "file"
    template: "src/utils.py.j2"

  # Documentation files
  - path: "README.md"
    type: "file"
    template: "README.md.j2"
  - path: "CHANGELOG.md"
    type: "file"
    template: "CHANGELOG.md.j2"
  - path: "IMPLEMENTATION_PLAN.md"
    type: "file"
    template: "IMPLEMENTATION_PLAN.md.j2"
  - path: "TECHNICAL_SPECIFICATION.md"
    type: "file"
    template: "TECHNICAL_SPECIFICATION.md.j2"
  - path: "AI_CONTEXT.md"
    type: "file"
    template: "AI_CONTEXT.md.j2"
  - path: "CODING_STANDARDS.md"
    type: "file"
    template: "CODING_STANDARDS.md.j2"

  # Development files
  - path: "DEV_RULES.md"
    type: "file"
    template: "DEV_RULES.md.j2"
  - path: "DEV_PROCESS.md"
    type: "file"
    template: "DEV_PROCESS.md.j2"

  # Testing files
  - path: "tests/__init__.py"
    type: "file"
    content: ""
  - path: "tests/test_game.py"
    type: "file"
    template: "tests/test_game.py.j2"
  - path: "tests/conftest.py"
    type: "file"
    template: "tests/conftest.py.j2"

  # Configuration files
  - path: ".gitignore"
    type: "file"
    template: ".gitignore.j2"
  - path: "pytest.ini"
    type: "file"
    template: "pytest.ini.j2"
  - path: "pyproject.toml"
    type: "file"
    template: "pyproject.toml.j2"

  # Development session tracking
  - path: "dev_sessions/README.md"
    type: "file"
    template: "dev_sessions/README.md.j2"

# Default requirements based on framework selection
requirements:
  base:
    - "python>=3.12"

  pygame:
    - "pygame>=2.5.0"

  arcade:
    - "arcade>=2.6.17"

  pyglet:
    - "pyglet>=2.0.0"

  pgzero:
    - "pgzero>=1.2.1"

  testing:
    - "pytest>=7.4.0"
    - "pytest-cov>=4.1.0"
    - "pytest-mock>=3.11.0"

  quality:
    - "black>=23.0.0"
    - "flake8>=6.0.0"
    - "pylint>=2.17.0"
    - "mypy>=1.5.0"

# Development tools configuration
dev_tools:
  linting:
    - flake8
    - pylint
  formatting:
    - black
  type_checking:
    - mypy
  testing:
    - pytest

# Git configuration
git:
  ignore_patterns:
    - "__pycache__/"
    - "*.pyc"
    - "*.pyo"
    - "*.pyd"
    - ".Python"
    - "build/"
    - "dist/"
    - "*.egg-info/"
    - ".env"
    - ".venv"
    - "env/"
    - "venv/"
    - ".coverage"
    - "htmlcov/"
    - ".pytest_cache/"
    - ".mypy_cache/"
    - ".DS_Store"
    - "Thumbs.db"
    - "*.log"
    - "logs/"

# IDE configuration suggestions
ide_config:
  vscode:
    extensions:
      - "ms-python.python"
      - "ms-python.black-formatter"
      - "ms-python.flake8"
      - "ms-python.pylint"
      - "ms-python.mypy-type-checker"
    settings:
      "python.defaultInterpreterPath": "./venv/bin/python"
      "python.formatting.provider": "black"
      "python.linting.enabled": true
      "python.linting.flake8Enabled": true
      "python.testing.pytestEnabled": true

  pycharm:
    interpreter: "Project venv"
    code_style: "PEP 8"
    inspections: "All enabled"
