template:
  name: "API Service"
  type: "api_service"
  description: "Production-ready REST/GraphQL API service with OpenAPI documentation"
  version: "1.0.0"
  author: "Project Architect"
  frameworks:
    - "FastAPI"
    - "Flask"

structure:
  # Directories
  - path: "app"
    type: "directory"
  - path: "app/api"
    type: "directory"
  - path: "app/api/v1"
    type: "directory"
  - path: "app/core"
    type: "directory"
  - path: "app/models"
    type: "directory"
  - path: "app/schemas"
    type: "directory"
  - path: "app/services"
    type: "directory"
  - path: "tests"
    type: "directory"
  - path: "dev_sessions"
    type: "directory"

  # Main entry point
  - path: "main.py"
    type: "file"
    template: "main.py.j2"

  # App package
  - path: "app/__init__.py"
    type: "file"
    content: ""
  - path: "app/api/__init__.py"
    type: "file"
    content: ""
  - path: "app/api/v1/__init__.py"
    type: "file"
    content: ""
  - path: "app/api/v1/endpoints.py"
    type: "file"
    template: "app/api/v1/endpoints.py.j2"
  - path: "app/core/__init__.py"
    type: "file"
    content: ""
  - path: "app/core/config.py"
    type: "file"
    template: "app/core/config.py.j2"
  - path: "app/core/security.py"
    type: "file"
    template: "app/core/security.py.j2"
    condition: "has_authentication"
  - path: "app/models/__init__.py"
    type: "file"
    content: ""
  - path: "app/models/base.py"
    type: "file"
    template: "app/models/base.py.j2"
    condition: "has_database"
  - path: "app/schemas/__init__.py"
    type: "file"
    content: ""
  - path: "app/schemas/common.py"
    type: "file"
    template: "app/schemas/common.py.j2"
  - path: "app/services/__init__.py"
    type: "file"
    content: ""

  # Tests
  - path: "tests/__init__.py"
    type: "file"
    content: ""
  - path: "tests/conftest.py"
    type: "file"
    template: "tests/conftest.py.j2"
  - path: "tests/test_api.py"
    type: "file"
    template: "tests/test_api.py.j2"
    condition: "include_tests"

  # Dev sessions
  - path: "dev_sessions/README.md"
    type: "file"
    template: "dev_sessions/README.md.j2"

  # Configuration
  - path: "requirements.txt"
    type: "file"
    template: "requirements.txt.j2"
  - path: "pyproject.toml"
    type: "file"
    template: "pyproject.toml.j2"
  - path: ".env.example"
    type: "file"
    template: ".env.example.j2"
  - path: ".gitignore"
    type: "file"
    template: ".gitignore.j2"
  - path: "pytest.ini"
    type: "file"
    template: "pytest.ini.j2"
    condition: "include_tests"

  # Docker
  - path: "Dockerfile"
    type: "file"
    template: "Dockerfile.j2"
    condition: "include_docker"
  - path: "docker-compose.yml"
    type: "file"
    template: "docker-compose.yml.j2"
    condition: "include_docker_compose"

  # Documentation
  - path: "README.md"
    type: "file"
    template: "README.md.j2"
  - path: "CHANGELOG.md"
    type: "file"
    template: "CHANGELOG.md.j2"
  - path: "AI_CONTEXT.md"
    type: "file"
    template: "AI_CONTEXT.md.j2"
  - path: "TECHNICAL_SPECIFICATION.md"
    type: "file"
    template: "TECHNICAL_SPECIFICATION.md.j2"
  - path: "DEV_RULES.md"
    type: "file"
    template: "DEV_RULES.md.j2"
  - path: "DEV_PROCESS.md"
    type: "file"
    template: "DEV_PROCESS.md.j2"
  - path: "CODING_STANDARDS.md"
    type: "file"
    template: "CODING_STANDARDS.md.j2"
  - path: "IMPLEMENTATION_PLAN.md"
    type: "file"
    template: "IMPLEMENTATION_PLAN.md.j2"
  - path: "API_DOCUMENTATION.md"
    type: "file"
    template: "API_DOCUMENTATION.md.j2"

requirements:
  fastapi:
    - "fastapi>=0.104.0"
    - "uvicorn[standard]>=0.24.0"
    - "pydantic>=2.5.0"
    - "pydantic-settings>=2.1.0"
  flask:
    - "flask>=3.0.0"
    - "flask-restx>=1.3.0"
  database:
    postgresql:
      - "asyncpg>=0.29.0"
      - "sqlalchemy>=2.0.0"
    sqlite:
      - "aiosqlite>=0.19.0"
      - "sqlalchemy>=2.0.0"
  authentication:
    jwt:
      - "pyjwt>=2.8.0"
      - "passlib[bcrypt]>=1.7.4"
  testing:
    - "pytest>=7.4.0"
    - "pytest-asyncio>=0.21.0"
    - "httpx>=0.25.0"

